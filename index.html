<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luca Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #a855f7;
            --bg: #030712;
            --card: rgba(17, 24, 39, 0.8);
            --track: #1f2937;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: #f8fafc;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;/* Usamos dvh para que en móvil ignore la barra del navegador */
			height: 100dvh; 
			overflow: hidden;
			/* Este padding "empuja" la tarjeta un poco hacia arriba */
			padding-bottom: 40px;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            background: var(--card);
            padding: 2.5rem 1.5rem;
            border-radius: 40px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }

        h1 {
            margin: 0 0 1rem 0;
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 1. Gráfico Circular */
        .chart-container {
            position: relative;
            height: 220px;
            margin: 0 auto 1.5rem auto;
            filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.2));
        }

        #percentage-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -1px;
            font-variant-numeric: tabular-nums;
        }

        /* 2. Stats (Días y HMS) */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px 10px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
            margin-bottom: 6px;
        }

        .stat-days {
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
            display: block;
        }

        .stat-hms {
            font-size: 0.9rem;
            color: #94a3b8;
            font-variant-numeric: tabular-nums;
            margin-top: 4px;
        }

        /* 3. Barra Horizontal (Al final) */
        .progress-wrapper {
            margin-top: 1rem;
            padding: 0 5px;
        }

        .progress-track {
            width: 100%;
            height: 8px;
            background: var(--track);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .dates-row {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 0.75rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Luca</h1>

        <div class="chart-container">
            <canvas id="progressChart"></canvas>
            <div id="percentage-center">0.00%</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Llevamos</div>
                <div id="passed-days" class="stat-days">--</div>
                <div id="passed-hms" class="stat-hms">--:--:--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Faltan</div>
                <div id="left-days" class="stat-days">--</div>
                <div id="left-hms" class="stat-hms">--:--:--</div>
            </div>
        </div>

        <div class="progress-wrapper">
            <div class="progress-track">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <div class="dates-row">
                <span>22/08/2025</span>
                <span>29/05/2026</span>
            </div>
        </div>
    </div>

    <script>
        const startDate = new Date('2025-08-22T00:00:00');
        const endDate = new Date('2026-05-29T00:00:00');
        const totalDuration = endDate - startDate;

        const ctx = document.getElementById('progressChart').getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, '#6366f1');
        gradient.addColorStop(1, '#a855f7');

        const progressChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [0, 100],
                    backgroundColor: [gradient, '#1f2937'],
                    borderWidth: 0,
                    cutout: '85%',
                    borderRadius: 20
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                plugins: { tooltip: { enabled: false }, legend: { display: false } }
            }
        });

        function update() {
            const now = new Date();
            const elapsed = now - startDate;
            const remaining = Math.max(0, endDate - now);
            const progress = Math.min(Math.max((elapsed / totalDuration) * 100, 0), 100);

            progressChart.data.datasets[0].data = [progress, 100 - progress];
            progressChart.update('none');
            document.getElementById('percentage-center').innerText = progress.toFixed(2) + '%';

            document.getElementById('progress-fill').style.width = progress + '%';

            const formatTime = (ms) => {
                const totalSec = Math.floor(ms / 1000);
                const d = Math.floor(totalSec / 86400);
                const h = String(Math.floor((totalSec % 86400) / 3600)).padStart(2, '0');
                const m = String(Math.floor((totalSec % 3600) / 60)).padStart(2, '0');
                const s = String(totalSec % 60).padStart(2, '0');
                return { days: `${d} días`, hms: `${h}:${m}:${s}` };
            };

            const p = formatTime(elapsed);
            const l = formatTime(remaining);

            document.getElementById('passed-days').innerText = p.days;
            document.getElementById('passed-hms').innerText = p.hms;
            document.getElementById('left-days').innerText = l.days;
            document.getElementById('left-hms').innerText = l.hms;
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
